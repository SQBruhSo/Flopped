<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StripeID Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-white overflow-hidden font-sans select-none w-screen h-screen">

    <div class="relative w-full h-full bg-neutral-950">
        <video id="webcam" autoplay playsinline muted class="w-full h-full object-cover"></video>
        
        <div class="absolute inset-0 pointer-events-none flex flex-col justify-between items-center py-12 px-6">
            <h1 class="text-lg font-bold tracking-widest bg-black/50 px-5 py-2.5 rounded-full backdrop-blur-xl border border-white/10 shadow-lg">
                STRIPE<span class="text-emerald-400">ID</span>
            </h1>
            
            <div id="scanner-box" class="w-80 h-44 border-2 border-white/40 rounded-2xl relative flex items-center justify-center transition-all duration-300 bg-black/10">
                <div class="absolute top-0 left-0 w-6 h-6 border-t-4 border-l-4 border-emerald-400 rounded-tl-lg -mt-[2px] -ml-[2px]"></div>
                <div class="absolute top-0 right-0 w-6 h-6 border-t-4 border-r-4 border-emerald-400 rounded-tr-lg -mt-[2px] -mr-[2px]"></div>
                <div class="absolute bottom-0 left-0 w-6 h-6 border-b-4 border-l-4 border-emerald-400 rounded-bl-lg -mb-[2px] -ml-[2px]"></div>
                <div class="absolute bottom-0 right-0 w-6 h-6 border-b-4 border-r-4 border-emerald-400 rounded-br-lg -mb-[2px] -mr-[2px]"></div>
                
                <div id="scanner-laser" class="absolute w-[92%] h-[2px] bg-emerald-400 shadow-[0_0_15px_#10b981]"></div>
                <p class="text-[11px] text-white/80 font-semibold tracking-wider bg-black/60 px-4 py-1.5 rounded-full">ENCAJA EL CÓDIGO RECTANGULAR</p>
            </div>

            <div class="pointer-events-auto flex flex-col items-center gap-2">
                <button id="btn-manual" class="px-4 py-2 bg-white/10 hover:bg-white/20 active:scale-95 transition-all text-xs border border-white/20 rounded-xl backdrop-blur-md">
                    Simular Lectura (00000000013)
                </button>
            </div>
        </div>
    </div>

    <div id="product-card" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto translate-y-full transition-transform duration-500 ease-out z-50 px-4 pb-6 pointer-events-none">
        <div class="bg-neutral-900/70 border border-white/10 backdrop-blur-3xl rounded-[32px] p-6 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] pointer-events-auto">
            <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-5 cursor-pointer" id="btn-close-bar"></div>
            
            <div class="flex flex-col gap-1.5">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                    <span class="text-[11px] font-bold uppercase tracking-widest text-emerald-400">Verificado Original</span>
                </div>
                <h2 class="text-2xl font-bold tracking-tight text-white mt-1" id="prod-nombre">Cargando producto...</h2>
                <p class="text-xs text-white/40" id="prod-id"></p>
                
                <div class="flex justify-between items-baseline mt-6 bg-white/5 p-4 rounded-2xl border border-white/5">
                    <span class="text-3xl font-black text-white tracking-tight" id="prod-precio">$0</span>
                    <span class="text-xs font-semibold text-neutral-400 bg-neutral-800 px-3 py-1 rounded-md" id="prod-stock">Stock: 0 u.</span>
                </div>
            </div>

            <button id="btn-close" class="mt-5 w-full py-4 bg-white text-black font-bold rounded-2xl active:scale-[0.98] transition-all text-sm shadow-lg">
                Continuar Escaneando
            </button>
        </div>
    </div>

</body>
</html>
